<svg viewBox="0 0 800 300" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e293b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#334155;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="tableGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e2e8f0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="300" fill="url(#bgGradient)"/>
  
  <!-- Conference room setting -->
  <!-- Floor -->
  <rect x="0" y="220" width="800" height="80" fill="#64748b" opacity="0.3"/>
  
  <!-- Main conference table -->
  <ellipse cx="400" cy="200" rx="180" ry="50" fill="url(#tableGradient)" stroke="#94a3b8" stroke-width="2"/>
  
  <!-- Chairs around table -->
  <rect x="320" y="170" width="25" height="40" rx="5" fill="#374151"/>
  <rect x="355" y="170" width="25" height="40" rx="5" fill="#374151"/>
  <rect x="420" y="170" width="25" height="40" rx="5" fill="#374151"/>
  <rect x="455" y="170" width="25" height="40" rx="5" fill="#374151"/>
  
  <rect x="320" y="210" width="25" height="40" rx="5" fill="#374151"/>
  <rect x="355" y="210" width="25" height="40" rx="5" fill="#374151"/>
  <rect x="420" y="210" width="25" height="40" rx="5" fill="#374151"/>
  <rect x="455" y="210" width="25" height="40" rx="5" fill="#374151"/>
  
  <!-- Laptops on table -->
  <rect x="350" y="185" width="20" height="15" rx="2" fill="#1f2937"/>
  <rect x="430" y="185" width="20" height="15" rx="2" fill="#1f2937"/>
  
  <!-- Documents -->
  <rect x="375" y="190" width="15" height="10" rx="1" fill="#ffffff"/>
  <rect x="405" y="188" width="15" height="10" rx="1" fill="#ffffff"/>
  
  <!-- Presentation screen -->
  <rect x="300" y="80" width="200" height="120" rx="5" fill="#1f2937" stroke="#374151" stroke-width="3"/>
  <rect x="310" y="90" width="180" height="100" rx="3" fill="#ffffff"/>
  
  <!-- Chart on screen -->
  <rect x="320" y="110" width="15" height="40" fill="url(#goldGradient)"/>
  <rect x="340" y="120" width="15" height="30" fill="#7c3aed"/>
  <rect x="360" y="105" width="15" height="45" fill="url(#goldGradient)"/>
  <rect x="380" y="115" width="15" height="35" fill="#7c3aed"/>
  <rect x="400" y="100" width="15" height="50" fill="url(#goldGradient)"/>
  
  <!-- Chart title -->
  <text x="400" y="175" text-anchor="middle" fill="#1f2937" font-family="Arial" font-size="10" font-weight="bold">Q4 Performance</text>
  
  <!-- Chandelier/Lighting -->
  <circle cx="400" cy="40" r="25" fill="url(#goldGradient)" opacity="0.8"/>
  <circle cx="385" cy="30" r="8" fill="url(#goldGradient)" opacity="0.6"/>
  <circle cx="415" cy="30" r="8" fill="url(#goldGradient)" opacity="0.6"/>
  <circle cx="400" cy="25" r="8" fill="url(#goldGradient)" opacity="0.6"/>
  
  <!-- Light rays -->
  <path d="M 400 65 L 380 200 L 420 200 Z" fill="rgba(251, 191, 36, 0.1)"/>
  
  <!-- Side decorative elements -->
  <!-- Left pillar -->
  <rect x="50" y="100" width="30" height="150" fill="#64748b"/>
  <rect x="45" y="100" width="40" height="15" fill="#94a3b8"/>
  
  <!-- Right pillar -->
  <rect x="720" y="100" width="30" height="150" fill="#64748b"/>
  <rect x="715" y="100" width="40" height="15" fill="#94a3b8"/>
  
  <!-- Corporate plants -->
  <ellipse cx="120" cy="240" rx="20" ry="30" fill="#22c55e"/>
  <rect x="110" y="240" width="20" height="20" fill="#a16207"/>
  
  <ellipse cx="680" cy="240" rx="20" ry="30" fill="#22c55e"/>
  <rect x="670" y="240" width="20" height="20" fill="#a16207"/>
  
  <!-- Professional atmosphere details -->
  <!-- Coffee/refreshment area -->
  <rect x="600" y="190" width="40" height="25" rx="5" fill="#8b5cf6"/>
  <circle cx="610" cy="195" r="3" fill="#ffffff"/>
  <circle cx="625" cy="195" r="3" fill="#ffffff"/>
  
  <!-- Name plates -->
  <rect x="335" y="195" width="30" height="5" rx="1" fill="url(#goldGradient)"/>
  <rect x="435" y="195" width="30" height="5" rx="1" fill="url(#goldGradient)"/>
</svg>