<svg viewBox="0 0 1200 600" xmlns="http://www.w3.org/2000/svg">
  <!-- Conference Room Background -->
  <defs>
    <linearGradient id="roomGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8f9fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e9ecef;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="screenGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a8a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Room Background -->
  <rect width="1200" height="600" fill="url(#roomGradient)"/>
  
  <!-- Floor -->
  <rect x="0" y="450" width="1200" height="150" fill="#d1d5db"/>
  
  <!-- Presentation Screen -->
  <rect x="50" y="80" width="350" height="220" rx="10" fill="#1f2937" stroke="#374151" stroke-width="8"/>
  <rect x="70" y="100" width="310" height="180" fill="url(#screenGradient)"/>
  
  <!-- Screen Content -->
  <text x="225" y="150" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="24" font-weight="bold">BUSINESS</text>
  <text x="225" y="180" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="24" font-weight="bold">GROWTH</text>
  <rect x="90" y="200" width="80" height="50" fill="rgba(255,255,255,0.2)" rx="5"/>
  <rect x="180" y="200" width="80" height="50" fill="rgba(255,255,255,0.2)" rx="5"/>
  <rect x="270" y="200" width="80" height="50" fill="rgba(255,255,255,0.2)" rx="5"/>
  
  <!-- Conference Table -->
  <ellipse cx="600" cy="480" rx="400" ry="80" fill="#8b5cf6" opacity="0.1"/>
  <ellipse cx="600" cy="470" rx="400" ry="75" fill="#7c3aed"/>
  
  <!-- Professional 1 - Black Woman Presenter (Center, Leading) -->
  <g transform="translate(250, 320)">
    <!-- Body -->
    <rect x="20" y="40" width="40" height="80" rx="20" fill="#1e40af"/>
    <!-- Arms -->
    <rect x="10" y="45" width="15" height="35" rx="7" fill="#f59e0b"/>
    <rect x="55" y="45" width="15" height="35" rx="7" fill="#f59e0b"/>
    <!-- Head -->
    <circle cx="40" cy="25" r="20" fill="#8b4513"/>
    <!-- Hair -->
    <path d="M20,15 Q40,5 60,15 Q60,25 55,35 Q45,40 40,38 Q35,40 25,35 Q20,25 20,15" fill="#2d1810"/>
    <!-- Facial features -->
    <circle cx="35" cy="22" r="1.5" fill="#000"/>
    <circle cx="45" cy="22" r="1.5" fill="#000"/>
    <path d="M38,28 Q40,30 42,28" stroke="#000" stroke-width="1" fill="none"/>
    <!-- Presenting gesture -->
    <circle cx="75" cy="50" r="3" fill="#f59e0b"/>
  </g>
  
  <!-- Professional 2 - Mixed Race Man (Seated Left) -->
  <g transform="translate(450, 380)">
    <!-- Body -->
    <rect x="15" y="30" width="35" height="60" rx="17" fill="#064e3b"/>
    <!-- Arms -->
    <rect x="8" y="35" width="12" height="25" rx="6" fill="#d4a574"/>
    <rect x="45" y="35" width="12" height="25" rx="6" fill="#d4a574"/>
    <!-- Head -->
    <circle cx="32" cy="18" r="15" fill="#d4a574"/>
    <!-- Hair -->
    <path d="M18,8 Q32,2 46,8 Q46,18 42,25 Q37,28 32,27 Q27,28 22,25 Q18,18 18,8" fill="#4a4a4a"/>
    <!-- Facial features -->
    <circle cx="28" cy="16" r="1" fill="#000"/>
    <circle cx="36" cy="16" r="1" fill="#000"/>
    <path d="M30,20 Q32,22 34,20" stroke="#000" stroke-width="0.8" fill="none"/>
    <!-- Laptop -->
    <rect x="20" y="60" width="25" height="15" rx="2" fill="#374151"/>
    <rect x="22" y="55" width="21" height="12" rx="1" fill="#1f2937"/>
  </g>
  
  <!-- Professional 3 - Black Man (Seated Right) -->
  <g transform="translate(720, 375)">
    <!-- Body -->
    <rect x="15" y="35" width="35" height="65" rx="17" fill="#7c2d12"/>
    <!-- Arms -->
    <rect x="8" y="40" width="12" height="30" rx="6" fill="#654321"/>
    <rect x="45" y="40" width="12" height="30" rx="6" fill="#654321"/>
    <!-- Head -->
    <circle cx="32" cy="20" r="16" fill="#654321"/>
    <!-- Hair -->
    <path d="M17,10 Q32,3 47,10 Q47,20 43,27 Q38,30 32,29 Q26,30 21,27 Q17,20 17,10" fill="#1a1a1a"/>
    <!-- Facial features -->
    <circle cx="28" cy="18" r="1.2" fill="#000"/>
    <circle cx="36" cy="18" r="1.2" fill="#000"/>
    <path d="M30,22 Q32,24 34,22" stroke="#000" stroke-width="1" fill="none"/>
    <!-- Notebook -->
    <rect x="22" y="65" width="20" height="12" rx="1" fill="#ffffff" stroke="#000"/>
  </g>
  
  <!-- Professional 4 - Asian Woman (Standing Right) -->
  <g transform="translate(850, 340)">
    <!-- Body -->
    <rect x="18" y="45" width="38" height="75" rx="19" fill="#be185d"/>
    <!-- Arms -->
    <rect x="10" y="50" width="14" height="30" rx="7" fill="#fbbf24"/>
    <rect x="54" y="50" width="14" height="30" rx="7" fill="#fbbf24"/>
    <!-- Head -->
    <circle cx="37" cy="28" r="18" fill="#fbbf24"/>
    <!-- Hair -->
    <path d="M20,18 Q37,8 54,18 Q54,28 50,35 Q43,38 37,37 Q31,38 24,35 Q20,28 20,18" fill="#2d1810"/>
    <!-- Facial features -->
    <circle cx="32" cy="26" r="1.3" fill="#000"/>
    <circle cx="42" cy="26" r="1.3" fill="#000"/>
    <path d="M35,30 Q37,32 39,30" stroke="#000" stroke-width="1" fill="none"/>
    <!-- Document -->
    <rect x="60" y="55" width="15" height="20" rx="2" fill="#ffffff" stroke="#000"/>
  </g>
  
  <!-- Professional 5 - Hispanic Man (Background Left) -->
  <g transform="translate(380, 360)">
    <!-- Body -->
    <rect x="12" y="40" width="30" height="55" rx="15" fill="#1e3a8a"/>
    <!-- Arms -->
    <rect x="6" y="45" width="10" height="25" rx="5" fill="#d69e2e"/>
    <rect x="39" y="45" width="10" height="25" rx="5" fill="#d69e2e"/>
    <!-- Head -->
    <circle cx="27" cy="22" r="13" fill="#d69e2e"/>
    <!-- Hair -->
    <path d="M15,12 Q27,6 39,12 Q39,22 36,28 Q31,31 27,30 Q23,31 18,28 Q15,22 15,12" fill="#2d1810"/>
    <!-- Facial features -->
    <circle cx="24" cy="20" r="1" fill="#000"/>
    <circle cx="30" cy="20" r="1" fill="#000"/>
    <path d="M25,24 Q27,26 29,24" stroke="#000" stroke-width="0.8" fill="none"/>
  </g>
  
  <!-- Professional 6 - White Woman (Background Center) -->
  <g transform="translate(620, 355)">
    <!-- Body -->
    <rect x="14" y="42" width="32" height="58" rx="16" fill="#059669"/>
    <!-- Arms -->
    <rect x="8" y="47" width="11" height="28" rx="5" fill="#fef3c7"/>
    <rect x="43" y="47" width="11" height="28" rx="5" fill="#fef3c7"/>
    <!-- Head -->
    <circle cx="30" cy="24" r="14" fill="#fef3c7"/>
    <!-- Hair -->
    <path d="M17,14 Q30,8 43,14 Q43,24 40,30 Q35,33 30,32 Q25,33 20,30 Q17,24 17,14" fill="#b45309"/>
    <!-- Facial features -->
    <circle cx="26" cy="22" r="1" fill="#000"/>
    <circle cx="34" cy="22" r="1" fill="#000"/>
    <path d="M28,26 Q30,28 32,26" stroke="#000" stroke-width="0.8" fill="none"/>
  </g>
  
  <!-- Professional 7 - Black Woman (Background Right) -->
  <g transform="translate(780, 365)">
    <!-- Body -->
    <rect x="12" y="38" width="28" height="52" rx="14" fill="#7c2d12"/>
    <!-- Arms -->
    <rect x="7" y="43" width="9" height="22" rx="4" fill="#92400e"/>
    <rect x="36" y="43" width="9" height="22" rx="4" fill="#92400e"/>
    <!-- Head -->
    <circle cx="26" cy="20" r="12" fill="#92400e"/>
    <!-- Hair -->
    <path d="M15,10 Q26,5 37,10 Q37,20 34,26 Q29,29 26,28 Q23,29 18,26 Q15,20 15,10" fill="#1a1a1a"/>
    <!-- Facial features -->
    <circle cx="23" cy="18" r="0.8" fill="#000"/>
    <circle cx="29" cy="18" r="0.8" fill="#000"/>
    <path d="M24,22 Q26,24 28,22" stroke="#000" stroke-width="0.7" fill="none"/>
  </g>
  
  <!-- Lighting Effects -->
  <circle cx="200" cy="50" r="30" fill="url(#screenGradient)" opacity="0.3"/>
  <circle cx="600" cy="100" r="150" fill="#ffffff" opacity="0.1"/>
  
  <!-- Corporate Elements -->
  <!-- Chart on wall -->
  <rect x="950" y="120" width="200" height="140" rx="5" fill="#ffffff" stroke="#d1d5db" stroke-width="2"/>
  <rect x="970" y="140" width="20" height="80" fill="#3b82f6"/>
  <rect x="1000" y="160" width="20" height="60" fill="#10b981"/>
  <rect x="1030" y="150" width="20" height="70" fill="#f59e0b"/>
  <rect x="1060" y="140" width="20" height="80" fill="#ef4444"/>
  <rect x="1090" y="130" width="20" height="90" fill="#8b5cf6"/>
  <text x="1050" y="250" text-anchor="middle" fill="#374151" font-family="Arial, sans-serif" font-size="12">GROWTH</text>
  
  <!-- Modern ceiling lights -->
  <rect x="300" y="20" width="80" height="8" rx="4" fill="#f3f4f6"/>
  <rect x="500" y="20" width="80" height="8" rx="4" fill="#f3f4f6"/>
  <rect x="700" y="20" width="80" height="8" rx="4" fill="#f3f4f6"/>
  <rect x="900" y="20" width="80" height="8" rx="4" fill="#f3f4f6"/>
</svg>