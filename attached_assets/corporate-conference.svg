<svg viewBox="0 0 1200 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradients for professional look -->
    <linearGradient id="roomGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e2e8f0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="tableGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e293b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#334155;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="screenGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e293b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="chairGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#374151;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1f2937;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="goldAccent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="burgundyAccent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#991b1b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7f1d1d;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Conference Room Background -->
  <rect width="1200" height="400" fill="url(#roomGradient)"/>
  
  <!-- Floor -->
  <rect x="0" y="320" width="1200" height="80" fill="#64748b" opacity="0.2"/>
  
  <!-- Back Wall -->
  <rect x="0" y="0" width="1200" height="320" fill="#f1f5f9"/>
  
  <!-- Large Conference Table -->
  <ellipse cx="600" cy="280" rx="300" ry="80" fill="url(#tableGradient)" stroke="#475569" stroke-width="3"/>
  
  <!-- Executive Chairs Around Table -->
  <!-- Left side chairs -->
  <g transform="translate(200,220)">
    <rect width="35" height="50" rx="8" fill="url(#chairGradient)"/>
    <rect x="5" y="5" width="25" height="35" rx="5" fill="#4b5563"/>
    <rect x="10" y="-10" width="15" height="15" rx="3" fill="#6b7280"/>
  </g>
  
  <g transform="translate(260,230)">
    <rect width="35" height="50" rx="8" fill="url(#chairGradient)"/>
    <rect x="5" y="5" width="25" height="35" rx="5" fill="#4b5563"/>
    <rect x="10" y="-10" width="15" height="15" rx="3" fill="#6b7280"/>
  </g>
  
  <g transform="translate(320,240)">
    <rect width="35" height="50" rx="8" fill="url(#chairGradient)"/>
    <rect x="5" y="5" width="25" height="35" rx="5" fill="#4b5563"/>
    <rect x="10" y="-10" width="15" height="15" rx="3" fill="#6b7280"/>
  </g>
  
  <!-- Right side chairs -->
  <g transform="translate(845,240)">
    <rect width="35" height="50" rx="8" fill="url(#chairGradient)"/>
    <rect x="5" y="5" width="25" height="35" rx="5" fill="#4b5563"/>
    <rect x="10" y="-10" width="15" height="15" rx="3" fill="#6b7280"/>
  </g>
  
  <g transform="translate(905,230)">
    <rect width="35" height="50" rx="8" fill="url(#chairGradient)"/>
    <rect x="5" y="5" width="25" height="35" rx="5" fill="#4b5563"/>
    <rect x="10" y="-10" width="15" height="15" rx="3" fill="#6b7280"/>
  </g>
  
  <g transform="translate(965,220)">
    <rect width="35" height="50" rx="8" fill="url(#chairGradient)"/>
    <rect x="5" y="5" width="25" height="35" rx="5" fill="#4b5563"/>
    <rect x="10" y="-10" width="15" height="15" rx="3" fill="#6b7280"/>
  </g>
  
  <!-- Head of table chairs -->
  <g transform="translate(575,180)">
    <rect width="50" height="35" rx="8" fill="url(#chairGradient)"/>
    <rect x="5" y="5" width="40" height="25" rx="5" fill="#991b1b"/>
    <rect x="15" y="-10" width="20" height="15" rx="3" fill="url(#burgundyAccent)"/>
  </g>
  
  <!-- Large Presentation Screen -->
  <rect x="400" y="50" width="400" height="240" rx="8" fill="url(#screenGradient)" stroke="#374151" stroke-width="4"/>
  <rect x="415" y="65" width="370" height="210" rx="5" fill="#ffffff"/>
  
  <!-- Professional Presentation Content -->
  <!-- Title -->
  <text x="600" y="90" text-anchor="middle" fill="#1f2937" font-family="Arial, sans-serif" font-size="18" font-weight="bold">Q4 BUSINESS REVIEW</text>
  
  <!-- Chart Area -->
  <rect x="440" y="110" width="320" height="140" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  
  <!-- Professional Bar Chart -->
  <rect x="460" y="190" width="25" height="40" fill="url(#burgundyAccent)"/>
  <rect x="490" y="180" width="25" height="50" fill="url(#goldAccent)"/>
  <rect x="520" y="170" width="25" height="60" fill="url(#burgundyAccent)"/>
  <rect x="550" y="160" width="25" height="70" fill="url(#goldAccent)"/>
  <rect x="580" y="150" width="25" height="80" fill="url(#burgundyAccent)"/>
  <rect x="610" y="140" width="25" height="90" fill="url(#goldAccent)"/>
  <rect x="640" y="135" width="25" height="95" fill="url(#burgundyAccent)"/>
  <rect x="670" y="130" width="25" height="100" fill="url(#goldAccent)"/>
  <rect x="700" y="125" width="25" height="105" fill="url(#burgundyAccent)"/>
  
  <!-- Chart Labels -->
  <text x="600" y="270" text-anchor="middle" fill="#374151" font-family="Arial, sans-serif" font-size="10">Revenue Growth</text>
  
  <!-- Laptops and Documents on Table -->
  <!-- Executive Laptop -->
  <rect x="540" y="260" width="40" height="25" rx="3" fill="#1f2937"/>
  <rect x="542" y="262" width="36" height="21" rx="2" fill="#4b5563"/>
  <circle cx="560" cy="272" r="1" fill="url(#goldAccent)"/>
  
  <!-- Documents and Reports -->
  <rect x="480" y="265" width="25" height="18" rx="1" fill="#ffffff" stroke="#e5e7eb"/>
  <rect x="485" y="270" width="15" height="1" fill="#9ca3af"/>
  <rect x="485" y="273" width="20" height="1" fill="#9ca3af"/>
  <rect x="485" y="276" width="12" height="1" fill="#9ca3af"/>
  
  <rect x="620" y="268" width="25" height="18" rx="1" fill="#ffffff" stroke="#e5e7eb"/>
  <rect x="625" y="273" width="15" height="1" fill="#9ca3af"/>
  <rect x="625" y="276" width="20" height="1" fill="#9ca3af"/>
  <rect x="625" y="279" width="12" height="1" fill="#9ca3af"/>
  
  <!-- Coffee Cups -->
  <circle cx="420" cy="275" r="8" fill="#ffffff" stroke="#d1d5db"/>
  <circle cx="420" cy="275" r="6" fill="#6b4423"/>
  
  <circle cx="780" cy="278" r="8" fill="#ffffff" stroke="#d1d5db"/>
  <circle cx="780" cy="278" r="6" fill="#6b4423"/>
  
  <!-- Professional Lighting -->
  <!-- Ceiling Lights -->
  <rect x="300" y="20" width="80" height="12" rx="6" fill="url(#goldAccent)" opacity="0.8"/>
  <rect x="820" y="20" width="80" height="12" rx="6" fill="url(#goldAccent)" opacity="0.8"/>
  
  <!-- Light Rays -->
  <path d="M 340 32 L 320 280 L 360 280 Z" fill="rgba(251, 191, 36, 0.05)"/>
  <path d="M 860 32 L 840 280 L 880 280 Z" fill="rgba(251, 191, 36, 0.05)"/>
  
  <!-- Corporate Branding Elements -->
  <!-- Company Logo Area -->
  <rect x="50" y="50" width="100" height="60" rx="5" fill="#ffffff" stroke="#e5e7eb"/>
  <text x="100" y="75" text-anchor="middle" fill="url(#burgundyAccent)" font-family="Arial, sans-serif" font-size="12" font-weight="bold">LOGO</text>
  <text x="100" y="90" text-anchor="middle" fill="#6b7280" font-family="Arial, sans-serif" font-size="8">COMPANY</text>
  
  <!-- Professional Plants/Decor -->
  <rect x="100" y="320" width="15" height="25" fill="#a16207"/>
  <ellipse cx="107" cy="320" rx="12" ry="20" fill="#22c55e"/>
  <ellipse cx="107" cy="315" rx="8" ry="15" fill="#16a34a"/>
  
  <rect x="1085" y="320" width="15" height="25" fill="#a16207"/>
  <ellipse cx="1092" cy="320" rx="12" ry="20" fill="#22c55e"/>
  <ellipse cx="1092" cy="315" rx="8" ry="15" fill="#16a34a"/>
  
  <!-- Window Blinds Effect -->
  <g opacity="0.1">
    <rect x="0" y="80" width="1200" height="4" fill="#64748b"/>
    <rect x="0" y="120" width="1200" height="4" fill="#64748b"/>
    <rect x="0" y="160" width="1200" height="4" fill="#64748b"/>
    <rect x="0" y="200" width="1200" height="4" fill="#64748b"/>
  </g>
  
  <!-- Professional Name Plates -->
  <rect x="520" y="285" width="40" height="8" rx="2" fill="url(#goldAccent)"/>
  <text x="540" y="291" text-anchor="middle" fill="#1f2937" font-family="Arial, sans-serif" font-size="6" font-weight="bold">CEO</text>
  
  <rect x="640" y="285" width="40" height="8" rx="2" fill="url(#goldAccent)"/>
  <text x="660" y="291" text-anchor="middle" fill="#1f2937" font-family="Arial, sans-serif" font-size="6" font-weight="bold">CFO</text>
</svg>