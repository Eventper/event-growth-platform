name: Weekly I Am Her Analytics

on:
  schedule:
    - cron: '0 8 * * MON' # every Monday 08:00 UTC
  workflow_dispatch:

jobs:
  fetch-report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Fetch analytics and save
        run: |
          node scripts/analytics/fetch-and-save.mjs https://eventperfekt.net

      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: iamher-analytics-report
          path: reports/*.json
