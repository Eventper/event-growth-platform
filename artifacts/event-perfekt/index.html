    <style>
      html,body{background:#330311;color:#F4ECD8;margin:0;padding:0;}
      /* Loading screen — fades out when React mounts */
      body:has(#root:not(:empty)) #loading-screen {
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.5s ease;
      }
      #loading-screen {
        position: fixed;
        inset: 0;
        background: #330311;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        transition: opacity 0.4s ease;
      }
      #loading-screen .logo {
        width: 80px;
        height: 80px;
        margin-bottom: 20px;
        animation: pulse 2s ease-in-out infinite;
      }
      #loading-screen .brand-name {
        font-family: 'Poppins', sans-serif;
        font-size: 14px;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        color: #C9A961;
        margin-bottom: 8px;
      }
      #loading-screen .tagline {
        font-family: 'Poppins', sans-serif;
        font-size: 11px;
        letter-spacing: 0.15em;
        color: rgba(244,236,216,0.4);
      }
      @keyframes pulse {
        0%, 100% { opacity: 0.6; transform: scale(0.98); }
        50% { opacity: 1; transform: scale(1.02); }
      }
    </style>
