<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="600" viewBox="0 0 1200 600">
  <!-- Modern conference room background with full frame coverage -->
  <defs>
    <linearGradient id="roomGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2c3e50;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#34495e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2c3e50;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="screenGlow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#e8f4ff;stop-opacity:0.8" />
    </linearGradient>
  </defs>
  
  <!-- Conference room background -->
  <rect width="1200" height="600" fill="url(#roomGradient)"/>
  
  <!-- Glass windows/wall panels -->
  <rect x="0" y="0" width="300" height="600" fill="#2c3e50" opacity="0.7"/>
  <rect x="900" y="0" width="300" height="600" fill="#2c3e50" opacity="0.7"/>
  
  <!-- Large presentation screen -->
  <rect x="400" y="80" width="400" height="220" fill="url(#screenGlow)" rx="10"/>
  <rect x="410" y="90" width="380" height="200" fill="#f8f9fa" rx="5"/>
  
  <!-- Screen content - presentation slide -->
  <text x="600" y="130" text-anchor="middle" fill="#2c3e50" font-family="Arial, sans-serif" font-size="24" font-weight="bold">CORPORATE STRATEGY 2024</text>
  <circle cx="550" cy="170" r="15" fill="#e74c3c"/>
  <circle cx="600" cy="170" r="15" fill="#3498db"/>
  <circle cx="650" cy="170" r="15" fill="#2ecc71"/>
  <rect x="480" y="200" width="240" height="8" fill="#34495e" rx="4"/>
  <rect x="480" y="220" width="180" height="8" fill="#7f8c8d" rx="4"/>
  <rect x="480" y="240" width="200" height="8" fill="#95a5a6" rx="4"/>
  
  <!-- Conference table -->
  <ellipse cx="600" cy="450" rx="350" ry="80" fill="#8b4513" opacity="0.8"/>
  <ellipse cx="600" cy="440" rx="350" ry="80" fill="#a0522d"/>
  
  <!-- Diverse group of professionals -->
  <!-- Person 1 - Black woman presenting -->
  <g transform="translate(550, 320)">
    <circle cx="0" cy="-20" r="18" fill="#8B4513"/>
    <rect x="-15" y="-5" width="30" height="40" fill="#2c3e50" rx="3"/>
    <rect x="-12" y="0" width="24" height="30" fill="#ffffff" rx="2"/>
    <rect x="-8" y="35" width="16" height="25" fill="#34495e" rx="2"/>
    <!-- Hair -->
    <path d="M -18,-25 Q 0,-35 18,-25 Q 15,-20 0,-15 Q -15,-20 -18,-25" fill="#2c3e50"/>
  </g>
  
  <!-- Person 2 - Mixed-race man listening -->
  <g transform="translate(450, 380)">
    <circle cx="0" cy="-20" r="16" fill="#CD853F"/>
    <rect x="-12" y="-5" width="24" height="35" fill="#1a1a2e" rx="3"/>
    <rect x="-10" y="0" width="20" height="25" fill="#ffffff" rx="2"/>
    <rect x="-8" y="30" width="16" height="20" fill="#0f3460" rx="2"/>
    <!-- Hair -->
    <ellipse cx="0" cy="-25" rx="16" ry="8" fill="#2c3e50"/>
  </g>
  
  <!-- Person 3 - Black man taking notes -->
  <g transform="translate(750, 380)">
    <circle cx="0" cy="-20" r="16" fill="#8B4513"/>
    <rect x="-12" y="-5" width="24" height="35" fill="#2c3e50" rx="3"/>
    <rect x="-10" y="0" width="20" height="25" fill="#e8f4ff" rx="2"/>
    <rect x="-8" y="30" width="16" height="20" fill="#34495e" rx="2"/>
    <!-- Hair -->
    <ellipse cx="0" cy="-25" rx="15" ry="7" fill="#1a1a1a"/>
  </g>
  
  <!-- Person 4 - Mixed-race woman -->
  <g transform="translate(380, 400)">
    <circle cx="0" cy="-20" r="15" fill="#DEB887"/>
    <rect x="-12" y="-5" width="24" height="35" fill="#8B0000" rx="3"/>
    <rect x="-10" y="0" width="20" height="25" fill="#ffffff" rx="2"/>
    <rect x="-7" y="30" width="14" height="20" fill="#2c3e50" rx="2"/>
    <!-- Hair -->
    <path d="M -15,-25 Q 0,-30 15,-25 Q 12,-18 0,-15 Q -12,-18 -15,-25" fill="#654321"/>
  </g>
  
  <!-- Person 5 - Black woman -->
  <g transform="translate(820, 400)">
    <circle cx="0" cy="-20" r="15" fill="#8B4513"/>
    <rect x="-12" y="-5" width="24" height="35" fill="#4a148c" rx="3"/>
    <rect x="-10" y="0" width="20" height="25" fill="#ffffff" rx="2"/>
    <rect x="-7" y="30" width="14" height="20" fill="#1a237e" rx="2"/>
    <!-- Hair -->
    <path d="M -15,-28 Q 0,-32 15,-28 Q 10,-20 0,-18 Q -10,-20 -15,-28" fill="#2c2c2c"/>
  </g>
  
  <!-- Person 6 - Mixed-race man -->
  <g transform="translate(320, 420)">
    <circle cx="0" cy="-15" r="14" fill="#CD853F"/>
    <rect x="-10" y="-2" width="20" height="28" fill="#0d47a1" rx="2"/>
    <rect x="-8" y="2" width="16" height="20" fill="#ffffff" rx="2"/>
    <rect x="-6" y="26" width="12" height="15" fill="#37474f" rx="2"/>
    <!-- Hair -->
    <ellipse cx="0" cy="-20" rx="14" ry="6" fill="#3e2723"/>
  </g>
  
  <!-- Person 7 - Black man -->
  <g transform="translate(880, 420)">
    <circle cx="0" cy="-15" r="14" fill="#8B4513"/>
    <rect x="-10" y="-2" width="20" height="28" fill="#1b5e20" rx="2"/>
    <rect x="-8" y="2" width="16" height="20" fill="#f5f5f5" rx="2"/>
    <rect x="-6" y="26" width="12" height="15" fill="#263238" rx="2"/>
    <!-- Hair -->
    <ellipse cx="0" cy="-20" rx="13" ry="5" fill="#1a1a1a"/>
  </g>
  
  <!-- Modern lighting effects -->
  <circle cx="300" cy="100" r="30" fill="#ffffff" opacity="0.1"/>
  <circle cx="900" cy="100" r="30" fill="#ffffff" opacity="0.1"/>
  
  <!-- Professional atmosphere elements -->
  <rect x="100" y="150" width="80" height="100" fill="#34495e" opacity="0.3" rx="5"/>
  <rect x="1020" y="150" width="80" height="100" fill="#34495e" opacity="0.3" rx="5"/>
  
  <!-- Additional ambient lighting -->
  <ellipse cx="600" cy="50" rx="200" ry="30" fill="#ffffff" opacity="0.05"/>
  
  <!-- Documents/laptops on table -->
  <rect x="400" y="430" width="20" height="15" fill="#2c3e50" rx="2"/>
  <rect x="780" y="435" width="18" height="12" fill="#1a1a2e" rx="2"/>
  <rect x="500" y="440" width="15" height="10" fill="#ffffff" rx="1"/>
  <rect x="700" y="438" width="16" height="12" fill="#e8f4ff" rx="1"/>
</svg>