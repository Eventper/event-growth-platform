kind = "web"
previewPath = "/"
title = "Event Perfekt Planning App"
version = "1.0.0"
id = "artifacts/event-perfekt"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20125

[services.development]
run = "pnpm --filter @workspace/event-perfekt run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/event-perfekt", "run", "build" ]
publicDir = "artifacts/event-perfekt/dist/public"
serve = "static"

[[services.production.rewrites]]
# Ensure prerendered /iamher/ files are served directly rather than being
# intercepted by the generic SPA catch-all. A specific rewrite for the
# /iamher/* path returns the prerendered index.html for that directory.
[[services.production.rewrites]]
from = "/iamher/*"
to = "/iamher/index.html"

[[services.production.rewrites]]
# Redirect the site root to the prerendered /iamher page.
from = "/"
to = "/iamher/index.html"

[[services.production.rewrites]]
# Redirect /home (exact) to /iamher
from = "/home"
to = "/iamher/index.html"

[[services.production.rewrites]]
# Redirect /home/* to /iamher
from = "/home/*"
to = "/iamher/index.html"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20125"
BASE_PATH = "/"
